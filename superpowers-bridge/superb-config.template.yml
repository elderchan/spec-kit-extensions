# Superpowers Bridge Configuration Template
#
# This template configures bridge behavior only.
# It does not define remote fallback rules or bundled skill content.

discovery:
  # Search order for installed superpowers skills.
  # workspace => ./.agents/skills
  # global    => ~/.agents/skills
  search_order:
    - workspace
    - global

requirements:
  hard:
    - test-driven-development
    - verification-before-completion

  optional:
    - brainstorming
    - systematic-debugging
    - receiving-code-review
    - finishing-a-development-branch
    - dispatching-parallel-agents
    - requesting-code-review
    - writing-plans

hook_policy:
  # Baseline hook requirements. Required hooks protect implementation and
  # completion truth; optional hooks improve upstream quality without taking
  # ownership of Spec Kit stages.
  required:
    - after_plan
    - before_implement
    - after_implement

  optional:
    - after_specify
    - after_tasks

commands:
  enable_brainstorm: true
  enable_review: true
  enable_critique: true
  enable_debug: true
  enable_finish: true
  enable_respond: true

disciplines:
  # These optional skills inform existing bridge commands rather than adding
  # competing Spec Kit workflow stages.
  enable_parallel_debug_dispatch: true
  enable_review_handoff_packaging: true
  enable_task_quality_checks: true

# Local override file (recommended for experimentation, gitignored):
# superb-config.local.yml
