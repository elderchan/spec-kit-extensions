schema_version: "1.0"

extension:
  id: "memorylint"
  name: "MemoryLint"
  version: 1.5.1
  description: "Evidence-driven instruction drift checker: audits agent memory files for boundary, reality, conflict, and redundancy drift."

  author: "rbbtsn0w"

requires:
  speckit_version: ">=0.5.1"

provides:
  commands:
    - name: "speckit.memorylint.audit"
      file: "commands/audit.md"
      description: "Audit agent instruction files and generate an evidence-bound drift report"
    - name: "speckit.memorylint.apply"
      file: "commands/apply.md"
      description: "Apply approved fixes from a previous MemoryLint audit report"
    - name: "speckit.memorylint.load-agents"
      file: "commands/load-agents.md"
      description: "Load AGENTS.md to ensure core rules do not drift during the planning phase"

hooks:
  before_constitution:
    command: "speckit.memorylint.audit"
    optional: true
    prompt: "Run MemoryLint audit to generate a boundary report before constitution generation?"
  after_constitution:
    command: "speckit.memorylint.audit"
    optional: true
    prompt: "Run MemoryLint audit to check for conflicts between constitution and AGENTS.md?"
  before_plan:
    command: "speckit.memorylint.load-agents"
    optional: false
    description: "Mandatory gate: Load AGENTS.md to enforce core rules and prevent rule drift during the planning (plan.md generation) phase."
