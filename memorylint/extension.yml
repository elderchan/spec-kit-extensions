schema_version: "1.0"

extension:
  id: "memorylint"
  name: "MemoryLint"
  version: 1.3.0
  description: "Agent memory governance tool: Automatically audits and fixes boundary conflicts between AGENTS.md and the constitution."

  author: "Spec-kit Community"

requires:
  speckit_version: ">=0.5.1"

provides:
  commands:
    - name: "speckit.memorylint.run"
      file: "commands/check-boundaries.md"
      description: "Audit and fix overlaps and out-of-bounds issues between AGENTS.md and project constitution"
    - name: "speckit.memorylint.load-agents"
      file: "commands/load-agents.md"
      description: "Load AGENTS.md to ensure core rules do not drift during the planning phase"

hooks:
  before_constitution:
    command: "speckit.memorylint.run"
    optional: true
    prompt: "Run MemoryLint to prune out-of-bounds architecture rules and enrich missing infrastructure guidelines in AGENTS.md?"
  after_constitution:
    command: "speckit.memorylint.run"
    optional: true
    prompt: "Run MemoryLint to perform semantic auditing and redundancy pruning on the generated constitution?"
  before_plan:
    command: "speckit.memorylint.load-agents"
    optional: false
    description: "Mandatory gate: Load AGENTS.md to enforce core rules and prevent rule drift during the planning (plan.md generation) phase."
