name: Release Trigger

on:
  workflow_dispatch:
    inputs:
      extension_id:
        description: 'Extension directory name (e.g., aide, extensify, presetify)'
        required: true
        type: string
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate inputs
        env:
          EXTENSION_ID: ${{ github.event.inputs.extension_id }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          # Strip optional v prefix
          VERSION="${VERSION#v}"

          # Validate version format
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Error: Invalid version format '$VERSION'. Must be SemVer: X.Y.Z, optionally with -prerelease and/or +build metadata" >&2
            exit 1
          fi

          # Validate extension directory exists
          if [[ ! -d "$EXTENSION_ID" ]]; then
            echo "Error: Extension directory '$EXTENSION_ID' not found" >&2
            exit 1
          fi

          # Validate extension.yml exists
          if [[ ! -f "$EXTENSION_ID/extension.yml" ]]; then
            echo "Error: $EXTENSION_ID/extension.yml not found" >&2
            exit 1
          fi

          TAG="${EXTENSION_ID}-v${VERSION}"

          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Error: Tag '$TAG' already exists" >&2
            exit 1
          fi

          CHANGELOG="$EXTENSION_ID/CHANGELOG.md"
          if [[ -f "$CHANGELOG" ]]; then
            if ! grep -q '^## \[Unreleased\]$' "$CHANGELOG"; then
              echo "Error: $CHANGELOG must contain a '## [Unreleased]' section" >&2
              exit 1
            fi
          else
            echo "Warning: $CHANGELOG not found; skipping changelog validation"
          fi

          echo "tag=$TAG" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_ENV"
          echo "Will create tag: $TAG"

      - name: Switch to default branch tip
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch origin "$DEFAULT_BRANCH"
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"

      - name: Validate PUSH_TOKEN secret
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          if [[ -z "$PUSH_TOKEN" ]]; then
            echo "Error: Repository secret PUSH_TOKEN is not set" >&2
            exit 1
          fi

      - name: Prepare release files
        env:
          EXTENSION_ID: ${{ github.event.inputs.extension_id }}
          VERSION: ${{ env.version }}
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          export TODAY

          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          extension_id = os.environ["EXTENSION_ID"]
          version = os.environ["VERSION"].lstrip("v")
          today = os.environ["TODAY"]
          github_server_url = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
          github_repository = os.environ["GITHUB_REPOSITORY"]
          tag = f"{extension_id}-v{version}"
          repo_base_url = f"{github_server_url}/{github_repository}"
          root = Path(extension_id)

          root_readme_file = Path("README.md")
          extension_file = root / "extension.yml"
          readme_file = root / "README.md"
          changelog_file = root / "CHANGELOG.md"

          if not extension_file.exists():
              raise SystemExit(f"Missing {extension_file}")

          # Update extension.version in the extension metadata block only.
          lines = extension_file.read_text(encoding="utf-8").splitlines()
          updated = False
          in_extension = False
          extension_indent = None
          for i, line in enumerate(lines):
              stripped = line.strip()
              indent = len(line) - len(line.lstrip(" "))

              if stripped == "extension:":
                  in_extension = True
                  extension_indent = indent
                  continue

              if in_extension:
                  if stripped and not stripped.startswith("#") and indent <= extension_indent:
                      in_extension = False
                      extension_indent = None
                  elif indent == extension_indent + 2 and re.match(r"^\s*version:\s*", line):
                      lines[i] = " " * (extension_indent + 2) + f"version: {version}"
                      updated = True
                      break
          if not updated:
              raise SystemExit("Failed to update extension.version in extension.yml")
          extension_file.write_text("\n".join(lines) + "\n", encoding="utf-8")

          # Update README release download links if present.
          if readme_file.exists():
              readme_text = readme_file.read_text(encoding="utf-8")
              readme_text = re.sub(
                  rf"(releases/download/)({re.escape(extension_id)}-v[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?)(/{re.escape(extension_id)}\.zip)",
                  rf"\g<1>{tag}\g<3>",
                  readme_text,
              )
              readme_file.write_text(readme_text, encoding="utf-8")

          # Update the root README extension version table.
          if root_readme_file.exists():
              root_readme_text = root_readme_file.read_text(encoding="utf-8")
              root_row_pattern = re.compile(
                  rf"^(\|\s*\[[^\]]+\]\(\./{re.escape(extension_id)}\)\s*\|\s*)([^|]+?)(\s*\|.*)$",
                  re.M,
              )
              root_readme_text, updated_rows = root_row_pattern.subn(
                  rf"\g<1>{version}\g<3>",
                  root_readme_text,
                  count=1,
              )
              if updated_rows != 1:
                  raise SystemExit(f"Failed to update {root_readme_file} version row for {extension_id}")
              root_readme_text = re.sub(
                  rf"(releases/download/)({re.escape(extension_id)}-v[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?)(/{re.escape(extension_id)}\.zip)",
                  rf"\g<1>{tag}\g<3>",
                  root_readme_text,
              )
              root_readme_file.write_text(root_readme_text, encoding="utf-8")

          # Rotate changelog unreleased section into a versioned release section when present.
          if changelog_file.exists():
              changelog_text = changelog_file.read_text(encoding="utf-8")
              match = re.search(r"^## \[Unreleased\]\n(?P<body>.*?)(?=^## \[|\Z)", changelog_text, re.S | re.M)
              if not match:
                  raise SystemExit("CHANGELOG.md must contain an '## [Unreleased]' section")

              body = match.group("body").strip("\n")
              if not body.strip():
                  raise SystemExit("CHANGELOG.md Unreleased section is empty")

              release_heading = f"## [{version}] - {today}\n"
              replacement = "## [Unreleased]\n\n" + release_heading + body.strip() + "\n\n"
              changelog_text = changelog_text[:match.start()] + replacement + changelog_text[match.end():]

              unreleased_link = f"[Unreleased]: {repo_base_url}/compare/{tag}...HEAD"
              release_link = f"[{version}]: {repo_base_url}/releases/tag/{tag}"

              if re.search(r"^\[Unreleased\]: .*?$", changelog_text, re.M):
                  changelog_text = re.sub(r"^\[Unreleased\]: .*?$", unreleased_link, changelog_text, count=1, flags=re.M)
              else:
                  changelog_text = changelog_text.rstrip() + "\n\n" + unreleased_link + "\n"

              release_ref_pattern = rf"^\[{re.escape(version)}\]: .*?$"
              if re.search(release_ref_pattern, changelog_text, re.M):
                  changelog_text = re.sub(release_ref_pattern, release_link, changelog_text, count=1, flags=re.M)
              else:
                  changelog_text = changelog_text.rstrip() + "\n" + release_link + "\n"

              changelog_file.write_text(changelog_text, encoding="utf-8")
          PY

      - name: Create release metadata commit and tag
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EXTENSION_ID: ${{ github.event.inputs.extension_id }}
          VERSION: ${{ env.version }}
          GITHUB_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          release_files=("$EXTENSION_ID/extension.yml")
          if [[ -f "$EXTENSION_ID/CHANGELOG.md" ]]; then
            release_files+=("$EXTENSION_ID/CHANGELOG.md")
          fi
          if [[ -f "$EXTENSION_ID/README.md" ]]; then
            release_files+=("$EXTENSION_ID/README.md")
          fi
          if [[ -f "README.md" ]]; then
            release_files+=("README.md")
          fi

          if git diff --quiet -- "${release_files[@]}"; then
            echo "Error: release preparation produced no changes" >&2
            exit 1
          fi

          EXPECTED_HEAD_OID="$(git rev-parse HEAD)"
          PAYLOAD_FILE="$(mktemp)"
          export EXPECTED_HEAD_OID PAYLOAD_FILE

          python3 - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          extension_id = os.environ["EXTENSION_ID"]
          version = os.environ["VERSION"]
          repository = os.environ["GITHUB_REPO"]
          default_branch = os.environ["DEFAULT_BRANCH"]
          expected_head_oid = os.environ["EXPECTED_HEAD_OID"]
          payload_file = Path(os.environ["PAYLOAD_FILE"])

          release_files = [Path(extension_id) / "extension.yml"]
          for relative_path in ("CHANGELOG.md", "README.md"):
              candidate = Path(extension_id) / relative_path
              if candidate.exists():
                  release_files.append(candidate)
          root_readme = Path("README.md")
          if root_readme.exists():
              release_files.append(root_readme)

          additions = []
          for path in release_files:
              additions.append(
                  {
                      "path": path.as_posix(),
                      "contents": base64.b64encode(path.read_bytes()).decode("ascii"),
                  }
              )

          payload = {
              "query": """
          mutation CreateReleaseCommit($input: CreateCommitOnBranchInput!) {
            createCommitOnBranch(input: $input) {
              commit {
                oid
              }
            }
          }
          """,
              "variables": {
                  "input": {
                      "branch": {
                          "repositoryNameWithOwner": repository,
                          "branchName": default_branch,
                      },
                      "message": {
                          "headline": f"chore: prepare {extension_id} release v{version} [skip ci]",
                      },
                      "fileChanges": {
                          "additions": additions,
                      },
                      "expectedHeadOid": expected_head_oid,
                  },
              },
          }

          payload_file.write_text(json.dumps(payload), encoding="utf-8")
          PY

          RELEASE_COMMIT="$(
            gh api graphql \
              --input "$PAYLOAD_FILE" \
              --jq '.data.createCommitOnBranch.commit.oid'
          )"

          if [[ -z "$RELEASE_COMMIT" ]]; then
            echo "Error: failed to create release metadata commit" >&2
            exit 1
          fi

          gh api "repos/${GITHUB_REPO}/git/refs" \
            --method POST \
            -f ref="refs/tags/$tag" \
            -f sha="$RELEASE_COMMIT" \
            --silent

          echo "release_commit=$RELEASE_COMMIT" >> "$GITHUB_ENV"

      - name: Create extension zip
        env:
          EXTENSION_ID: ${{ github.event.inputs.extension_id }}
        run: |
          rm -f "${EXTENSION_ID}.zip"
          cd "$EXTENSION_ID"
          zip -r "../${EXTENSION_ID}.zip" . \
            -x '.*' '__pycache__/*'

      - name: Generate release notes
        id: notes
        env:
          EXTENSION_ID: ${{ github.event.inputs.extension_id }}
          VERSION: ${{ env.version }}
        run: |
          CHANGELOG="$EXTENSION_ID/CHANGELOG.md"

          {
            echo 'body<<EOF'
            if [[ -f "$CHANGELOG" ]]; then
              awk -v ver="$VERSION" '
                /^## \[/ {
                  if (found) exit
                  if (index($0, ver)) found=1
                }
                found { print }
              ' "$CHANGELOG"
            else
              echo "Release $EXTENSION_ID v$VERSION"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          EXTENSION_ID: ${{ github.event.inputs.extension_id }}
          VERSION: ${{ env.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$tag" \
            "${EXTENSION_ID}.zip" \
            --title "$EXTENSION_ID v$VERSION" \
            --notes "${{ steps.notes.outputs.body }}" \
            --verify-tag
